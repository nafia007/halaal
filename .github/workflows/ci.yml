name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (compile + test + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
        working-directory: .
      - run: npx turbo run test --filter=@halaal/contracts

  typecheck:
    name: Typecheck & build (api, web, db)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate --schema packages/db/prisma/schema.prisma
      - name: Typecheck all packages
        run: npx turbo run typecheck
      - name: Build web
        run: npx turbo run build --filter=@halaal/web
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:3001

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx turbo run lint
